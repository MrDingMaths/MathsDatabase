<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsDatabase — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MathsDatabase Admin</span>
    <nav class="site-header__nav">
      <a href="index.html">About</a>
      <a href="worksheet.html">Worksheet</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </header>

  <!-- Login Section -->
  <div id="login-section" class="main-content">
    <div class="admin-login">
      <h2 class="admin-login__title">Admin Login</h2>
      <div class="admin-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Password">
        </div>
        <button id="login-btn" class="btn btn--primary">Log in</button>
        <div id="login-error" style="color:var(--color-highlight);font-size:0.85rem;"></div>
      </div>
    </div>
  </div>

  <!-- Admin Section (hidden until login) -->
  <div id="admin-section" class="main-content" style="display:none;">
    <h2 id="form-title" style="margin-bottom:1.5rem;">Add New Question</h2>

    <form id="question-form" class="admin-form">
      <!-- Question Text with Preview -->
      <div class="form-group">
        <label for="question-text">Question Text (use $...$ for inline maths, $$...$$ for display)</label>
      </div>
      <div class="preview-split">
        <div class="form-group">
          <textarea id="question-text" placeholder="Enter question text..."></textarea>
        </div>
        <div>
          <div class="preview-pane__label">Preview</div>
          <div id="question-preview" class="preview-pane"></div>
        </div>
      </div>

      <!-- Solution Text with Preview -->
      <div class="form-group">
        <label for="solution-text">Solution Text</label>
      </div>
      <div class="preview-split">
        <div class="form-group">
          <textarea id="solution-text" placeholder="Enter solution..."></textarea>
        </div>
        <div>
          <div class="preview-pane__label">Preview</div>
          <div id="solution-preview" class="preview-pane"></div>
        </div>
      </div>

      <!-- Classifications -->
      <div class="form-group">
        <label>Classifications <span style="color:var(--color-text-light);font-weight:400;font-size:0.85rem;">— add one or more Stage › Topic › Subtopic entries</span></label>
        <div id="classifications-list"></div>
        <div class="classification-adder">
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.5rem;align-items:end;">
            <div>
              <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;">Stage</label>
              <select id="cls-stage-select"><option value="">Select stage</option></select>
            </div>
            <div>
              <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;">Topic</label>
              <select id="cls-topic-select"><option value="">Select topic</option></select>
            </div>
            <div>
              <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;">Subtopic (optional)</label>
              <select id="cls-subtopic-select"><option value="">None</option></select>
            </div>
            <button type="button" id="add-cls-btn" class="btn btn--secondary">Add</button>
          </div>
        </div>
      </div>

      <!-- Difficulty -->
      <div class="form-group">
        <label>Difficulty</label>
        <div class="difficulty-radios">
          <label><input type="radio" name="difficulty" value="foundation"> Foundation</label>
          <label><input type="radio" name="difficulty" value="development" checked> Development</label>
          <label><input type="radio" name="difficulty" value="mastery"> Mastery</label>
          <label><input type="radio" name="difficulty" value="challenge"> Challenge</label>
        </div>
      </div>

      <!-- Marks -->
      <div class="form-group" style="max-width:8rem;">
        <label for="marks-input">Marks</label>
        <input type="number" id="marks-input" min="1" max="20" placeholder="1">
      </div>

      <!-- Image Upload -->
      <div class="form-group">
        <label>Question Image</label>
        <div id="question-drop-zone" class="drop-zone">
          Drag & drop an image here, or click to select
          <input type="file" id="question-image-input" accept="image/*" style="display:none;">
        </div>
        <div id="question-image-preview-container"></div>
      </div>

      <div class="form-group">
        <label>Solution Image</label>
        <div id="solution-drop-zone" class="drop-zone">
          Drag & drop an image here, or click to select
          <input type="file" id="solution-image-input" accept="image/*" style="display:none;">
        </div>
        <div id="solution-image-preview-container"></div>
      </div>

      <!-- Tags & Source -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
        <div class="form-group">
          <label for="tags-input">Tags (comma-separated)</label>
          <input type="text" id="tags-input" placeholder="e.g. algebra, quadratic, HSC">
        </div>
        <div class="form-group">
          <label for="source-input">Source</label>
          <input type="text" id="source-input" placeholder="e.g. 2023 HSC Q5">
        </div>
      </div>

      <div style="display:flex;gap:0.75rem;">
        <button type="submit" id="submit-btn" class="btn btn--primary">Submit Question</button>
        <button type="button" id="clear-form-btn" class="btn btn--secondary">Clear Form</button>
        <button type="button" id="cancel-edit-btn" class="btn btn--secondary" style="display:none;">Cancel Edit</button>
      </div>
    </form>


    <!-- Bulk Import -->
    <div style="margin:2rem 0;">
      <button type="button" id="bulk-import-toggle" class="btn btn--secondary">Show Bulk Import</button>
      <div id="bulk-import-section" style="display:none;margin-top:1rem;">
        <div class="form-group">
          <label>Upload JSON file or paste below</label>
          <input type="file" id="bulk-import-file" accept=".json">
        </div>
        <div class="form-group">
          <label for="bulk-import-json">JSON Array of Questions</label>
          <textarea id="bulk-import-json" rows="10" placeholder='[{"question_text": "...", "answer": "...", "answer_type": "exact", "stage": "stage4", "topic": "Algebra", "difficulty": "B", "subtopic": ["Linear Equations"], "marks": 1}]'></textarea>
        </div>
        <div style="display:flex;gap:0.75rem;">
          <button type="button" id="bulk-validate-btn" class="btn btn--secondary">Validate</button>
          <button type="button" id="bulk-submit-btn" class="btn btn--primary" style="display:none;">Import</button>
        </div>
        <div id="bulk-import-results" style="margin-top:1rem;"></div>
      </div>
    </div>
    <!-- All Questions -->
    <div class="recent-questions">
      <h3 class="recent-questions__title">All Questions</h3>
      <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
        <input type="text" id="q-search" placeholder="Search question text...">
        <select id="q-stage-filter">
          <option value="">All stages</option>
        </select>
        <input type="text" id="q-topic-filter" placeholder="Filter by topic...">
        <select id="q-difficulty-filter">
          <option value="">All difficulties</option>
          <option value="foundation">Foundation</option>
          <option value="development">Development</option>
          <option value="mastery">Mastery</option>
          <option value="challenge">Challenge</option>
        </select>
      </div>
      <div id="q-count" style="font-size:0.85rem;color:var(--color-text-light);margin-bottom:0.5rem;"></div>
      <table class="questions-table">
        <thead>
          <tr>
            <th>Question</th>
            <th>Classification</th>
            <th>Diff</th>
            <th>Marks</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="recent-questions-body"></tbody>
      </table>
      <div style="text-align:center;margin-top:1rem;">
        <button type="button" id="load-more-btn" class="btn btn--secondary" style="display:none;">Load More</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
