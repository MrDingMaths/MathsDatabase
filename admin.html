<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsBase — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MathsBase Admin</span>
    <nav class="site-header__nav">
      <a href="index.html">About</a>
      <a href="worksheet.html">Worksheet</a>
      <a href="admin.html" class="active">Admin</a>
    </nav>
  </header>

  <!-- Login Section -->
  <div id="login-section" class="main-content">
    <div class="admin-login">
      <h2 class="admin-login__title">Admin Login</h2>
      <div class="admin-form">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Password">
        </div>
        <button id="login-btn" class="btn btn--primary">Log in</button>
        <div id="login-error" style="color:var(--color-highlight);font-size:0.85rem;"></div>
      </div>
    </div>
  </div>

  <!-- Admin Section (hidden until login) -->
  <div id="admin-section" class="main-content" style="display:none;">

    <!-- Top bar: title + actions -->
    <div class="admin-topbar">
      <h2 id="form-title">Add New Question</h2>
      <div class="admin-topbar__actions">
        <button type="button" id="bulk-import-toggle" class="btn btn--secondary">Bulk Import</button>
        <button type="submit" id="submit-btn" form="question-form" class="btn btn--primary">Submit Question</button>
        <button type="button" id="clear-form-btn" class="btn btn--secondary">Clear Form</button>
        <button type="button" id="cancel-edit-btn" class="btn btn--secondary" style="display:none;">Cancel Edit</button>
      </div>
    </div>

    <!-- Bulk Import (collapsible) -->
    <div id="bulk-import-section" style="display:none;margin-bottom:1.5rem;">
      <div class="form-group">
        <label>Upload JSON file or paste below</label>
        <input type="file" id="bulk-import-file" accept=".json">
      </div>
      <div class="form-group">
        <label for="bulk-import-json">JSON Array of Questions</label>
        <textarea id="bulk-import-json" rows="10" placeholder='[{"question_text": "...", "answer": "...", "answer_type": "exact", "stage": "stage4", "topic": "Algebra", "difficulty": "B", "subtopic": ["Linear Equations"], "marks": 1}]'></textarea>
      </div>
      <div style="display:flex;gap:0.75rem;">
        <button type="button" id="bulk-validate-btn" class="btn btn--secondary">Validate</button>
        <button type="button" id="bulk-submit-btn" class="btn btn--primary" style="display:none;">Import</button>
      </div>
      <div id="bulk-import-results" style="margin-top:1rem;"></div>
    </div>

    <!-- Two-column layout: search left, edit right -->
    <div class="admin-layout">

      <!-- LEFT: Question search & list -->
      <div class="admin-layout__search">
        <div class="recent-questions">
          <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.75rem;flex-wrap:wrap;">
            <h3 class="recent-questions__title" style="margin:0;">All Questions</h3>
            <select id="sort-select" class="btn btn--secondary btn--small">
              <option value="source">Sort: Source</option>
              <option value="difficulty">Sort: Difficulty</option>
              <option value="topic">Sort: Topic</option>
              <option value="marks">Sort: Marks</option>
            </select>
            <button id="toggle-cards-btn" class="btn btn--secondary btn--small">Expand All</button>
            <button id="toggle-solutions-display-btn" class="btn btn--secondary btn--small">Show Solutions</button>
          </div>
          <div class="filter-bar" style="margin-bottom:0.5rem;">
            <input type="text" id="search-filter" class="filter-bar__search" placeholder="Search questions…">
            <div id="course-filter" class="multi-select">
              <button type="button" class="multi-select__toggle">All Courses</button>
              <div class="multi-select__panel"></div>
            </div>
            <div id="topic-filter" class="multi-select">
              <button type="button" class="multi-select__toggle">All Topics</button>
              <div class="multi-select__panel"></div>
            </div>
            <div id="subtopic-filter" class="multi-select">
              <button type="button" class="multi-select__toggle">All Subtopics</button>
              <div class="multi-select__panel"></div>
            </div>
            <div id="difficulty-filter" class="multi-select">
              <button type="button" class="multi-select__toggle">All Difficulties</button>
              <div class="multi-select__panel"></div>
            </div>
          </div>
          <div id="q-count" style="font-size:0.85rem;color:var(--color-text-light);margin-bottom:0.5rem;"></div>
          <div id="questions-container" class="questions-grid"></div>
          <div style="text-align:center;margin-top:1rem;">
            <button type="button" id="load-more-btn" class="btn btn--secondary" style="display:none;">Load More</button>
          </div>
        </div>
      </div>

      <!-- RIGHT: Edit form -->
      <div class="admin-layout__edit">
        <form id="question-form" class="admin-form">

          <!-- Classifications -->
          <div class="form-group">
            <label>Classifications</label>
            <div class="classification-adder">
              <div>
                <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;">Courses</label>
                <div id="cls-courses-checkboxes" style="display:flex;flex-wrap:wrap;gap:0.25rem 0;padding:0.25rem 0;"></div>
              </div>
              <div style="margin-top:0.75rem;">
                <label style="font-size:0.8rem;font-weight:600;display:block;margin-bottom:0.25rem;">Topic / Subtopic</label>
                <div id="classifications-list"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:0.5rem;align-items:end;margin-top:0.25rem;">
                  <select id="cls-topic-select"><option value="">Select topic</option></select>
                  <select id="cls-subtopic-select"><option value="">None</option></select>
                  <button type="button" id="add-cls-btn" class="btn btn--secondary">Add</button>
                </div>
              </div>
            </div>
          </div>

          <!-- Question Text with Preview -->
          <div class="form-group">
            <label for="question-text">Question Text (use $...$ for inline maths, $$...$$ for display)
              <button type="button" id="question-insert-img-btn" class="btn btn--secondary btn--small" style="margin-left:0.5rem;">Insert Image</button>
            </label>
            <textarea id="question-text" placeholder="Enter question text..."></textarea>
            <div class="preview-pane__label">Preview</div>
            <div id="question-preview" class="preview-pane"></div>
          </div>

          <!-- Solution Text with Preview -->
          <div class="form-group">
            <label for="solution-text">Solution Text
              <button type="button" id="solution-insert-img-btn" class="btn btn--secondary btn--small" style="margin-left:0.5rem;">Insert Image</button>
            </label>
            <textarea id="solution-text" placeholder="Enter solution..."></textarea>
            <div class="preview-pane__label">Preview</div>
            <div id="solution-preview" class="preview-pane"></div>
          </div>

          <!-- Difficulty -->
          <div class="form-group">
            <label>Difficulty</label>
            <div class="difficulty-radios">
              <label><input type="radio" name="difficulty" value="Foundation"> Foundation</label>
              <label><input type="radio" name="difficulty" value="Development" checked> Development</label>
              <label><input type="radio" name="difficulty" value="Mastery"> Mastery</label>
              <label><input type="radio" name="difficulty" value="Challenge"> Challenge</label>
            </div>
          </div>

          <!-- Marks -->
          <div class="form-group" style="max-width:8rem;">
            <label for="marks-input">Marks</label>
            <input type="number" id="marks-input" min="1" max="20" placeholder="1">
          </div>

          <!-- Calculator -->
          <div class="form-group">
            <label>Calculator</label>
            <div class="difficulty-radios">
              <label><input type="radio" name="calculator" value=""> Not specified</label>
              <label><input type="radio" name="calculator" value="true"> Calculator</label>
              <label><input type="radio" name="calculator" value="false"> Non-calculator</label>
            </div>
          </div>

          <!-- Tags & Source -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
            <div class="form-group">
              <label for="tags-input">Tags (comma-separated)</label>
              <input type="text" id="tags-input" placeholder="e.g. algebra, quadratic, HSC">
            </div>
            <div class="form-group">
              <label for="source-input">Source</label>
              <input type="text" id="source-input" placeholder="e.g. 2023 HSC Q5">
            </div>
          </div>

        </form>
      </div>

    </div><!-- /.admin-layout -->
  </div><!-- /#admin-section -->

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
