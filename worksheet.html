<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsBase Worksheet Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">
      <img class="site-header__logo" src="favicon.ico" alt="MathsBase logo" width="40" height="40">
      MathsBase
    </span>
    <nav class="site-header__nav">
      <a href="index.html">About</a>
      <a href="worksheet.html" class="active">Database</a>
      <a href="admin.html">Admin</a>
      <button class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    </nav>
  </header>

  <main class="main-content worksheet-main">
    <div class="worksheet-top">
      <section class="filter-bar filter-bar--chips">
        <input type="text" id="search-filter" class="filter-bar__search" placeholder="Search questions…">
        <div id="course-filter" class="filter-row"></div>
        <div id="topic-filter" class="filter-row"></div>
        <div id="subtopic-filter" class="filter-row"></div>
        <div id="difficulty-filter" class="filter-row"></div>
      </section>

      <div class="worksheet-controls">
        <span id="q-count" class="results-count"></span>
        <span id="selected-count" class="results-count">0 questions selected</span>
        <div class="worksheet-actions">
          <select id="sort-select" class="btn btn--secondary btn--small">
            <option value="source">Sort: Source</option>
            <option value="difficulty">Sort: Difficulty</option>
            <option value="topic">Sort: Topic</option>
            <option value="marks">Sort: Marks</option>
          </select>
          <button id="toggle-cards-btn" class="btn btn--secondary btn--small">Expand All</button>
          <button id="toggle-solutions-display-btn" class="btn btn--secondary btn--small">Show Solutions</button>
          <button id="select-all" class="btn btn--secondary btn--small">Select All</button>
          <button id="delect-all" class="btn btn--secondary btn--small">Deselect All</button>
          <button id="random-question-btn" class="btn btn--secondary btn--small">Add Random</button>
          <button id="generate-worksheet" class="btn btn--success">Generate Worksheet</button>
          <button id="toggle-solutions-btn" class="btn btn--success">Show Solutions</button>
          <button id="toggle-feedback-btn" class="btn btn--success">Show Feedback</button>
          <button id="print-btn" class="btn btn--success btn--print">Print<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg></button>
        </div>
      </div>
    </div>

    <div class="worksheet-layout" id="worksheet-layout">
      <div class="questions-col">
        <section id="questions-container" class="questions-grid"></section>
        <div id="load-more-container" class="load-more-container" style="display:none;">
          <button id="load-more-btn" class="btn btn--secondary">Load More</button>
        </div>
      </div>
      <div id="worksheet-preview-outer" class="worksheet-preview-outer" style="display:none;">
        <div id="worksheet-preview" class="worksheet-preview"></div>
      </div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/theme.js"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/worksheet.js"></script>
</body>
</html>
