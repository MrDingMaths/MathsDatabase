<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MrDingMaths — Worksheet Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MrDingMaths Worksheet</span>
    <nav class="site-header__nav">
      <a href="index.html">Browse</a>
      <a href="quiz.html">Quiz</a>
      <a href="worksheet.html" class="active">Worksheet</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="main-content">
    <section class="filter-bar">
      <select id="stage-filter"><option value="">All Stages</option></select>
      <select id="topic-filter"><option value="">All Topics</option></select>
      <select id="subtopic-filter"><option value="">All Subtopics</option></select>
      <select id="difficulty-filter">
        <option value="">All Difficulties</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
      </select>
    </section>

    <div class="worksheet-controls">
      <span id="selected-count" class="results-count">0 questions selected</span>
      <div class="worksheet-actions">
        <button id="select-all" class="btn btn--secondary btn--small">Select All</button>
        <button id="delect-all" class="btn btn--secondary btn--small">Deselect All</button>
        <button id="generate-worksheet" class="btn btn--primary">Generate Worksheet</button>
        <button id="generate-with-answers" class="btn btn--secondary">With Answer Key</button>
        <button id="print-btn" class="btn btn--primary">Print</button>
      </div>
    </div>

    <section id="questions-container" class="questions-grid"></section>

    <div id="worksheet-preview" class="worksheet-preview" style="display:none;"></div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/worksheet.js"></script>
</body>
</html>
