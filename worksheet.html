<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsDatabase — Worksheet Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/print.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MathsDatabase Worksheet</span>
    <nav class="site-header__nav">
      <a href="index.html">About</a>
      <a href="worksheet.html" class="active">Worksheet</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="main-content">
    <section class="filter-bar">
      <input type="text" id="search-filter" class="filter-bar__search" placeholder="Search questions…">
      <div id="course-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Courses</button>
        <div class="multi-select__panel"></div>
      </div>
      <div id="topic-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Topics</button>
        <div class="multi-select__panel"></div>
      </div>
      <div id="subtopic-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Subtopics</button>
        <div class="multi-select__panel"></div>
      </div>
      <div id="difficulty-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Difficulties</button>
        <div class="multi-select__panel"></div>
      </div>
    </section>

    <div class="worksheet-controls">
      <span id="selected-count" class="results-count">0 questions selected</span>
      <div class="worksheet-actions">
        <select id="sort-select" class="btn btn--secondary btn--small">
          <option value="source">Sort: Source</option>
          <option value="difficulty">Sort: Difficulty</option>
          <option value="topic">Sort: Topic</option>
          <option value="marks">Sort: Marks</option>
        </select>
        <button id="toggle-cards-btn" class="btn btn--secondary btn--small">Expand All</button>
        <button id="toggle-solutions-display-btn" class="btn btn--secondary btn--small">Show Solutions</button>
        <button id="select-all" class="btn btn--secondary btn--small">Select All</button>
        <button id="delect-all" class="btn btn--secondary btn--small">Deselect All</button>
        <button id="generate-worksheet" class="btn btn--primary">Generate Worksheet</button>
        <button id="toggle-solutions-btn" class="btn btn--secondary">Print with Solutions</button>
        <button id="print-btn" class="btn btn--primary">Print</button>
      </div>
    </div>

    <section id="questions-container" class="questions-grid"></section>

    <div id="worksheet-preview" class="worksheet-preview" style="display:none;"></div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/worksheet.js"></script>
</body>
</html>
