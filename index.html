<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsDatabase — Question Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MathsDatabase Question Bank</span>
    <nav class="site-header__nav">
      <a href="index.html" class="active">Browse</a>
      <a href="quiz.html">Quiz</a>
      <a href="worksheet.html">Worksheet</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="main-content">
    <section class="filter-bar">
      <div id="stage-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Stages</button>
        <div class="multi-select__panel"></div>
      </div>
      <div id="topic-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Topics</button>
        <div class="multi-select__panel"></div>
      </div>
      <div id="subtopic-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Subtopics</button>
        <div class="multi-select__panel"></div>
      </div>
      <div id="difficulty-filter" class="multi-select">
        <button type="button" class="multi-select__toggle">All Difficulties</button>
        <div class="multi-select__panel"></div>
      </div>
      <input type="text" id="search-input" class="filter-bar__search" placeholder="Search questions...">
    </section>

    <div id="results-count" class="results-count"></div>
    <section id="questions-container" class="questions-grid"></section>
    <div class="pagination">
      <button id="load-more" class="btn btn--primary" style="display:none;">Load more</button>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
