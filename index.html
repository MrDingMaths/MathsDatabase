<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsDatabase — About</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <style>
    .about-hero {
      text-align: center;
      padding: 3rem 2rem 2rem;
    }
    .about-hero__title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--color-dark);
      margin-bottom: 0.75rem;
    }
    .about-hero__tagline {
      font-size: 1.1rem;
      color: var(--color-text-light);
      max-width: 540px;
      margin: 0 auto;
    }
.nav-cards {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      padding: 1rem 2rem 3rem;
      flex-wrap: wrap;
    }
    .nav-card {
      background: var(--color-card-bg);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.75rem 2rem;
      text-decoration: none;
      color: var(--color-text);
      width: 220px;
      box-shadow: var(--shadow);
      transition: box-shadow var(--transition), transform var(--transition);
    }
    .nav-card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-2px);
    }
    .nav-card__title {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--color-dark);
      margin-bottom: 0.5rem;
    }
    .nav-card__desc {
      font-size: 0.88rem;
      color: var(--color-text-light);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MathsDatabase Question Bank</span>
    <nav class="site-header__nav">
      <a href="index.html" class="active">About</a>
      <a href="worksheet.html">Worksheet</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="main-content">
    <section class="about-hero">
      <h1 class="about-hero__title">MathsDatabase Question Bank</h1>
      <p class="about-hero__tagline">A curated collection of maths questions spanning multiple stages and topics, built for worksheet generation.</p>
    </section>

    <div class="nav-cards">
      <a href="worksheet.html" class="nav-card">
        <div class="nav-card__title">Worksheet</div>
        <div class="nav-card__desc">Select questions and generate a printable worksheet with or without answers.</div>
      </a>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/about.js"></script>
</body>
</html>
