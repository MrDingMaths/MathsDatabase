<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MathsDatabase — Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/cards.css">
  <link rel="stylesheet" href="css/quiz.css">
</head>
<body>
  <header class="site-header">
    <span class="site-header__title">MathsDatabase Quiz</span>
    <nav class="site-header__nav">
      <a href="index.html">Browse</a>
      <a href="quiz.html" class="active">Quiz</a>
      <a href="worksheet.html">Worksheet</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="main-content">
    <!-- Setup Screen -->
    <div id="quiz-setup" class="quiz-setup">
      <h2 class="quiz-setup__title">Start a Quiz</h2>
      <div class="quiz-setup__filters">
        <select id="quiz-stage"><option value="">All Stages</option></select>
        <select id="quiz-topic"><option value="">All Topics</option></select>
      </div>
      <button id="start-quiz" class="btn btn--primary">Start Quiz</button>
    </div>

    <!-- Quiz Area (hidden until start) -->
    <div id="quiz-area" class="quiz-area" style="display:none;">
      <div class="quiz-progress">
        <span id="quiz-progress-text">Question 1 of ?</span>
        <span id="quiz-score" class="quiz-score">Score: 0/0</span>
      </div>
      <div id="quiz-question" class="quiz-question"></div>
      <div id="quiz-feedback" class="quiz-feedback" style="display:none;"></div>
      <div class="quiz-nav">
        <button id="quiz-next" class="btn btn--primary" style="display:none;">Next</button>
      </div>
    </div>

    <!-- End Screen (hidden until finish) -->
    <div id="quiz-end" class="quiz-end" style="display:none;"></div>
  </main>

  <div id="toast" class="toast"></div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/render.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/quiz.js"></script>
</body>
</html>
